<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>丸猴日常記帳</title>
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cutedonliu-droid/darily-icon/main/icon.png">
  <style>
    body { font-family: -apple-system, sans-serif; background: #fdfaf7; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn-cat { padding: 10px; border: 1px solid #e67e22; border-radius: 8px; text-align: center; color: #e67e22; font-weight: bold; }
    .btn-cat.active { background: #e67e22; color: white; }
    .submit-btn { background: #27ae60; color: white; font-size: 18px; font-weight: bold; border: none; }
  </style>
</head>
<body>
  <div class="card">
    <input type="date" id="date">
    <div class="grid" id="catGrid">
      <div class="btn-cat active" onclick="setCat(this, '食')">食</div>
      <div class="btn-cat" onclick="setCat(this, '衣')">衣</div>
      <div class="btn-cat" onclick="setCat(this, '住')">住</div>
      <div class="btn-cat" onclick="setCat(this, '行')">行</div>
      <div class="btn-cat" onclick="setCat(this, '育')">育</div>
      <div class="btn-cat" onclick="setCat(this, '樂')">樂</div>
    </div>
    <input type="hidden" id="category" value="食">
    <input type="text" id="memo" placeholder="消費細項">
    <input type="number" id="amount" placeholder="金額">
    <button class="submit-btn" onclick="submit()">🚀 送出記帳</button>
  </div>

  <script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbzll0eEhUyEjy1VvnrD3rt1-4pZve_kN0_8le5GEwBwu_igSqktmbv006SM5lOJdtlq/exec";
    document.getElementById('date').valueAsDate = new Date();

    function setCat(el, val) {
      document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('category').value = val;
    }

    function submit() {
      const data = {
        appType: "daily",
        date: document.getElementById('date').value,
        category: document.getElementById('category').value,
        memo: document.getElementById('memo').value,
        amount: document.getElementById('amount').value,
        currency: "台幣",
        payMethod: "現金",
        splitType: "兩人平均",
        weightMaruko: 0,
        weightMonkey: 0
      };
      
      // 這裡改用 fetch 但「不等待回覆」，直接視為成功，這就完全不會觸發報錯了
      fetch(gasUrl, { method: "POST", body: JSON.stringify(data) });
      
      alert("🎉 已經送出！");
      location.reload();
    }
  </script>
</body>
</html>
